<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>47MS — Leveling Guide</title>
<style>
  :root {
    --bg-1: #0d1117;
    --bg-2: #151b24;
    --bg-3: #1c2430;
    --border: #2a3444;
    --text: #e6edf3;
    --text-dim: #9aa7b8;
    --accent: #ffb84d;
    --accent-2: #ffd27a;

    --c-quest: #6ea8ff;
    --c-train: #5ed27a;
    --c-pq:    #c08bff;
    --c-boss:  #ff5e6c;
    --c-mini:  #ff9a3c;
    --c-park:  #4ad6c4;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(255, 184, 77, 0.08), transparent 60%),
      radial-gradient(1000px 500px at 100% 0%, rgba(110, 168, 255, 0.07), transparent 60%),
      var(--bg-1);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
  }

  header {
    padding: 36px 24px 18px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255, 184, 77, 0.06), transparent);
  }
  header h1 {
    margin: 0 0 6px;
    font-size: 36px;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header p {
    margin: 0;
    color: var(--text-dim);
    font-size: 14px;
  }

  .controls {
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(10px);
    background: rgba(13, 17, 23, 0.85);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
  }
  .controls-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: center;
  }
  .search {
    flex: 1 1 240px;
    max-width: 320px;
    padding: 8px 12px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 184, 77, 0.15);
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .filter {
    background: var(--bg-3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .filter:hover { color: var(--text); border-color: #3a4658; }
  .filter.active {
    color: #0d1117;
    background: var(--accent);
    border-color: var(--accent);
    font-weight: 600;
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 22px 20px 60px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 14px;
  }

  .card {
    background: linear-gradient(180deg, var(--bg-2), var(--bg-3));
    border: 1px solid var(--border);
    border-left: 4px solid var(--cat-color, var(--accent));
    border-radius: 10px;
    padding: 14px 16px;
    transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .level {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.4px;
    color: var(--accent);
    background: rgba(255, 184, 77, 0.08);
    border: 1px solid rgba(255, 184, 77, 0.25);
    padding: 3px 8px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .level-group {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .solo-badge {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.4px;
    color: #ff5e6c;
    background: rgba(255, 94, 108, 0.08);
    border: 1px solid rgba(255, 94, 108, 0.25);
    padding: 3px 8px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #0d1117;
    background: var(--cat-color, var(--accent));
    white-space: nowrap;
  }
  .name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 2px 0 4px;
  }
  .name {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }
  .row {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.45;
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }
  .row .ico { flex: 0 0 auto; line-height: 1; }
  .row .txt { flex: 1; }
  .row em { color: #cdd6e0; font-style: normal; }
  .loc-link { color: var(--accent); text-decoration: none; font-size: 13px; display: block; }
  .loc-link:hover { text-decoration: underline; }
  .row-icon { object-fit: contain; vertical-align: middle; image-rendering: pixelated; }
  .loc-multi { display: flex; align-items: flex-start; gap: 6px; }
  .loc-links { display: flex; flex-direction: column; gap: 2px; }

  .mapmark {
    width: 32px;
    height: 32px;
    object-fit: contain;
    vertical-align: middle;
    margin-right: 2px;
    image-rendering: pixelated;
    border-radius: 3px;
  }

  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 20px;
    font-size: 15px;
  }

  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding: 20px;
    border-top: 1px solid var(--border);
  }

  .cat-Questline      { --cat-color: var(--c-quest); }
  .cat-Training       { --cat-color: var(--c-train); }
  .cat-PQ             { --cat-color: var(--c-pq); }
  .cat-Boss           { --cat-color: var(--c-boss); }
  .cat-Miniboss       { --cat-color: var(--c-mini); }
  .cat-MonsterPark    { --cat-color: var(--c-park); }

  .level-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    padding-top: 6px;
  }
  .level-label {
    font-size: 13px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .level-label strong {
    color: var(--accent);
    font-size: 15px;
    display: inline-block;
    min-width: 28px;
    text-align: center;
  }
  .range-wrap {
    position: relative;
    flex: 1 1 200px;
    max-width: 440px;
    height: 36px;
  }
  .range-track {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    pointer-events: none;
  }
  .range-fill {
    position: absolute;
    top: 0;
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
  }
  .range-thumb {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 100%;
    height: 18px;
    margin: 0;
    padding: 0;
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    outline: none;
    pointer-events: none;
  }
  .range-thumb::-webkit-slider-runnable-track {
    background: transparent;
    height: 18px;
  }
  .range-thumb::-moz-range-track {
    background: transparent;
    height: 4px;
    border: none;
  }
  .range-thumb::-webkit-slider-thumb {
    -webkit-appearance: none;
    pointer-events: all;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg-1);
    cursor: grab;
    box-shadow: 0 0 0 3px rgba(255, 184, 77, 0.45);
    transition: box-shadow 0.15s;
    margin-top: 0;
  }
  .range-thumb::-webkit-slider-thumb:hover {
    box-shadow: 0 0 0 6px rgba(255, 184, 77, 0.3);
  }
  .range-thumb:active::-webkit-slider-thumb {
    cursor: grabbing;
    box-shadow: 0 0 0 7px rgba(255, 184, 77, 0.25);
  }
  .range-thumb::-moz-range-thumb {
    pointer-events: all;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg-1);
    cursor: grab;
    box-shadow: 0 0 0 3px rgba(255, 184, 77, 0.45);
  }
</style>
</head>

  ENTRIES.sort((a, b) => a.min - b.min || a.cat.localeCompare(b.cat));

  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    })[c]);
  }

  function rowHTML(icon, text) {
    if (!text) return "";
    return `<div class="row"><span class="ico">${icon}</span><span class="txt"><em>${escapeHTML(text)}</em></span></div>`;
  }

  function locRowHTML(loc, locs) {
    if (!loc && !(locs && locs.length)) return "";
    if (locs && locs.length) {
      const links = locs.map(l =>
        l.url
          ? `<a class="loc-link" href="${escapeHTML(l.url)}" target="_blank" rel="noopener">${escapeHTML(l.text)}</a>`
          : `<em>${escapeHTML(l.text)}</em>`
      ).join("");
      return `<div class="row"><span class="ico"></span><span class="txt"><span class="loc-links">${links}</span></span></div>`;
    }
    return `<div class="row"><span class="ico"></span><span class="txt"><em>${escapeHTML(loc)}</em></span></div>`;
  }

  function render() {
    const cards = ENTRIES.map(e => `
      <div class="card cat-${e.cat}" data-cat="${e.cat}" data-min="${e.min}" data-max="${parseMax(e.lv)}" data-search="${escapeHTML((e.name + " " + (e.loc||"") + " " + (e.locs ? e.locs.map(l=>l.text).join(" ") : "") + " " + (e.weapon||"") + " " + (e.method||"") + " " + (e.note||"")).toLowerCase())}">
        <div class="card-top">
          <div class="level-group">
            <span class="level">Lv ${escapeHTML(e.lv)}</span>
            ${e.soloLv ? `<span class="solo-badge">MIN DPM ${escapeHTML(e.soloLv)}</span>` : ''}
          </div>
          <span class="badge">${escapeHTML(CAT_LABEL[e.cat])}</span>
        </div>
        <div class="name-row">
          ${e.mapIcon ? `<img class="mapmark" src="${IMAGES[e.mapIcon] || ''}" alt="" />` : ''}
          <div class="name">${escapeHTML(e.name)}</div>
        </div>
        ${locRowHTML(e.loc, e.locs)}
        ${e.weapon ? `<div class="row"><span class="ico"><img class="row-icon" src="${IMAGES['bestfor.png']}" alt="" /></span><span class="txt"><strong>BEST FOR:</strong> <em>${escapeHTML(e.weapon)}</em></span></div>` : ''}
        ${rowHTML(`<img class="row-icon" src="${IMAGES['leech.png']}" alt="" />`, e.method)}
        ${e.prequest ? `<div class="row"><span class="ico"><img class="row-icon" src="${IMAGES['prequest.png']}" alt="" /></span><span class="txt"><em>${escapeHTML(e.prequest)}</em></span></div>` : ''}
        ${e.infos ? e.infos.map(i => typeof i === 'string'
          ? `<div class="row"><span class="ico"><img class="row-icon" src="${IMAGES['info.png']}" alt="" /></span><span class="txt"><em>${escapeHTML(i)}</em></span></div>`
          : `<div class="row"><span class="ico"><img class="row-icon" src="${IMAGES['info.png']}" alt="" /></span><span class="txt"><a class="loc-link" href="${escapeHTML(i.url)}" target="_blank" rel="noopener">${escapeHTML(i.text)}</a></span></div>`
        ).join('') : ''}
        ${e.info ? `<div class="row"><span class="ico"><img class="row-icon" src="${IMAGES['info.png']}" alt="" /></span><span class="txt"><em>${escapeHTML(e.info)}</em></span></div>` : ''}
        ${rowHTML("💬", e.note)}
      </div>
    `).join("");
    grid.innerHTML = cards;
  }

  function applyFilter() {
    const cat = document.querySelector(".filter.active").dataset.cat;
    const q   = document.getElementById("search").value.trim().toLowerCase();
    const filterMin = parseInt(document.getElementById("lv-min").value);
    const filterMax = parseInt(document.getElementById("lv-max").value);
    const rangeActive = filterMin !== 10 || filterMax !== 275;
    let visible = 0;
    grid.querySelectorAll(".card").forEach(card => {
      const matchCat    = cat === "all" || card.dataset.cat === cat;
      const matchSearch = !q || card.dataset.search.includes(q);
      const cMin = parseInt(card.dataset.min);
      const cMax = parseInt(card.dataset.max);
      const matchLevel  = !rangeActive || (cMin <= filterMax && cMax >= filterMin);
      const show = matchCat && matchSearch && matchLevel;
      card.style.display = show ? "" : "none";
      if (show) visible++;
    });
    empty.hidden = visible !== 0;
  }

  document.getElementById("filters").addEventListener("click", e => {
    if (!e.target.classList.contains("filter")) return;
    document.querySelectorAll(".filter").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    applyFilter();
  });
  document.getElementById("search").addEventListener("input", applyFilter);

  const lvMin     = document.getElementById("lv-min");
  const lvMax     = document.getElementById("lv-max");
  const lvMinVal  = document.getElementById("lv-min-val");
  const lvMaxVal  = document.getElementById("lv-max-val");
  const rangeFill = document.getElementById("range-fill");
  const RANGE_SPAN = 275 - 10;

  function updateRange() {
    const lo = parseInt(lvMin.value);
    const hi = parseInt(lvMax.value);
    const pctLo = (lo - 10) / RANGE_SPAN * 100;
    const pctHi = (hi - 10) / RANGE_SPAN * 100;
    rangeFill.style.left  = pctLo + "%";
    rangeFill.style.width = (pctHi - pctLo) + "%";
    lvMinVal.textContent = lo;
    lvMaxVal.textContent = hi;
  }

  lvMin.addEventListener("input", () => {
    if (parseInt(lvMin.value) > parseInt(lvMax.value)) lvMin.value = lvMax.value;
    updateRange();
    applyFilter();
  });

  lvMax.addEventListener("input", () => {
    if (parseInt(lvMax.value) < parseInt(lvMin.value)) lvMax.value = lvMin.value;
    updateRange();
    applyFilter();
  });

  updateRange();

  render();
  applyFilter();
</script>
</body>
</html>
